  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c8cd9f7c-0ea3-420a-804e-66dfe6516932\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   Friends&Coffee — Design Tokens\n   colors_and_type.css\n\n   Green-forward editorial palette, terracotta accent,\n   Fraunces (display) + Inter (body) + JetBrains Mono.\n   ============================================================ */\n\n/* ---- Fonts (Google Fonts CDN) -----------------------------\n   If loading manually, @import or <link> these:\n   https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap\n   ----------------------------------------------------------- */\n\n:root {\n  /* ---------- Core palette ---------- */\n  --color-forest:      #1F3A2E;   /* primary dark */\n  --color-forest-deep: #142620;   /* pressed / darker */\n  --color-moss:        #5A7552;   /* secondary */\n  --color-sage:        #B8C4A6;   /* tertiary / tint */\n  --color-terracotta:  #C65A2E;   /* single warm accent */\n  --color-terracotta-deep: #A44A24;\n  --color-cream:       #F4EFE6;   /* page bg */\n  --color-paper:       #FAF7F0;   /* card bg */\n  --color-ink:         #1A1A15;   /* body text */\n  --color-white:       #FFFFFF;\n\n  /* ---------- Ink scale (text on cream) ---------- */\n  --ink-100: #1A1A15;\n  --ink-80:  rgba(26, 26, 21, 0.80);\n  --ink-60:  rgba(26, 26, 21, 0.60);\n  --ink-40:  rgba(26, 26, 21, 0.40);\n  --ink-20:  rgba(26, 26, 21, 0.20);\n  --ink-10:  rgba(26, 26, 21, 0.10);\n  --ink-05:  rgba(26, 26, 21, 0.05);\n\n  /* ---------- Cream scale (text on forest) ---------- */\n  --cream-100: #F4EFE6;\n  --cream-80:  rgba(244, 239, 230, 0.80);\n  --cream-60:  rgba(244, 239, 230, 0.60);\n\n  /* ---------- Semantic ---------- */\n  --color-success: #3D7A4E;\n  --color-warning: #B8872A;\n  --color-danger:  #A4402A;\n  --color-info:    #5A7552;\n\n  /* ---------- Foreground semantics ---------- */\n  --fg-1: var(--ink-100);      /* primary text */\n  --fg-2: var(--ink-80);       /* secondary text */\n  --fg-3: var(--ink-60);       /* tertiary / meta */\n  --fg-4: var(--ink-40);       /* disabled / faint */\n  --fg-link: var(--color-terracotta);\n  --fg-on-dark: var(--cream-100);\n  --fg-on-dark-2: var(--cream-80);\n\n  /* ---------- Background semantics ---------- */\n  --bg-page: var(--color-cream);\n  --bg-card: var(--color-paper);\n  --bg-raised: var(--color-white);\n  --bg-dark: var(--color-forest);\n  --bg-dark-deep: var(--color-forest-deep);\n  --bg-tint: var(--color-sage);\n\n  /* ---------- Borders ---------- */\n  --border-hairline: 1px solid var(--ink-10);\n  --border-strong: 1px solid var(--ink-20);\n  --border-on-dark: 1px solid var(--cream-60);\n\n  /* ---------- Radii ---------- */\n  --radius-0: 0;\n  --radius-1: 4px;\n  --radius-2: 8px;\n  --radius-pill: 999px;\n\n  /* ---------- Shadows (very restrained) ---------- */\n  --shadow-0: none;\n  --shadow-1: 0 1px 2px rgba(26, 26, 21, 0.04), 0 2px 8px rgba(26, 26, 21, 0.03);\n  --shadow-2: 0 4px 16px rgba(26, 26, 21, 0.06), 0 12px 32px rgba(26, 26, 21, 0.04);\n\n  /* ---------- Spacing (8px grid) ---------- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* ---------- Type families ---------- */\n  --font-display: 'Fraunces', 'Times New Roman', Georgia, serif;\n  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* ---------- Type scale ---------- */\n  --type-display-1: 400 96px/1.02 var(--font-display);\n  --type-h1:        400 72px/1.05 var(--font-display);\n  --type-h2:        400 48px/1.10 var(--font-display);\n  --type-h3:        500 32px/1.20 var(--font-display);\n  --type-h4:        500 24px/1.30 var(--font-display);\n\n  --type-body-l:    400 20px/1.6 var(--font-body);\n  --type-body:      400 17px/1.6 var(--font-body);\n  --type-body-s:    400 15px/1.55 var(--font-body);\n  --type-small:     400 14px/1.5 var(--font-body);\n  --type-micro:     400 12px/1.4 var(--font-body);\n\n  --type-eyebrow:   500 12px/1.4 var(--font-body);\n  --type-button:    500 15px/1   var(--font-body);\n  --type-mono:      400 14px/1.5 var(--font-mono);\n\n  /* ---------- Motion ---------- */\n  --ease-out-soft: cubic-bezier(0.2, 0.8, 0.2, 1);\n  --ease-in-out:   cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-fast:  200ms;\n  --dur-base:  300ms;\n  --dur-slow:  500ms;\n\n  /* ---------- Layout ---------- */\n  --content-max: 1280px;\n  --gutter:      96px;\n  --gutter-sm:   24px;\n}\n\n/* ============================================================\n   Base styles + semantic elements\n   ============================================================ */\n\nhtml { font-family: var(--font-body); color: var(--fg-1); background: var(--bg-page); }\n\nbody {\n  font: var(--type-body);\n  color: var(--fg-1);\n  background: var(--bg-page);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n  margin: 0;\n}\n\n/* Headings */\nh1, .h1 { font: var(--type-h1); letter-spacing: -0.02em; color: var(--fg-1); margin: 0; text-wrap: balance; }\nh2, .h2 { font: var(--type-h2); letter-spacing: -0.015em; color: var(--fg-1); margin: 0; text-wrap: balance; }\nh3, .h3 { font: var(--type-h3); letter-spacing: -0.01em;  color: var(--fg-1); margin: 0; }\nh4, .h4 { font: var(--type-h4); letter-spacing: -0.005em; color: var(--fg-1); margin: 0; }\n\n.display-1 { font: var(--type-display-1); letter-spacing: -0.025em; }\n\np, .body { font: var(--type-body); color: var(--fg-1); margin: 0 0 1em; text-wrap: pretty; max-width: 70ch; }\n.body-l { font: var(--type-body-l); color: var(--fg-1); }\n.body-s { font: var(--type-body-s); color: var(--fg-1); }\nsmall, .small { font: var(--type-small); color: var(--fg-3); }\n.micro { font: var(--type-micro); color: var(--fg-3); }\n\n/* Eyebrow / kicker */\n.eyebrow {\n  font: var(--type-eyebrow);\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--color-moss);\n  display: inline-block;\n}\n\n/* Mono */\ncode, .mono, kbd, samp {\n  font: var(--type-mono);\n  color: var(--fg-2);\n}\n\n/* Links */\na {\n  color: var(--fg-link);\n  text-decoration: underline;\n  text-decoration-thickness: 1px;\n  text-underline-offset: 3px;\n  transition: text-decoration-thickness var(--dur-fast) var(--ease-out-soft);\n}\na:hover { text-decoration-thickness: 2px; }\n\n/* Horizontal rule */\nhr {\n  border: 0;\n  border-top: 1px solid var(--ink-10);\n  margin: var(--space-7) 0;\n}\n\n/* Selection */\n::selection { background: var(--color-terracotta); color: var(--color-cream); }\n\n/* ============================================================\n   Utility classes (optional)\n   ============================================================ */\n\n.bg-cream  { background: var(--bg-page); color: var(--fg-1); }\n.bg-paper  { background: var(--bg-card); color: var(--fg-1); }\n.bg-forest { background: var(--bg-dark); color: var(--fg-on-dark); }\n.bg-forest-deep { background: var(--bg-dark-deep); color: var(--fg-on-dark); }\n.bg-sage   { background: var(--bg-tint); color: var(--fg-1); }\n.bg-terracotta { background: var(--color-terracotta); color: var(--color-cream); }\n\n.text-forest     { color: var(--color-forest); }\n.text-moss       { color: var(--color-moss); }\n.text-terracotta { color: var(--color-terracotta); }\n.text-cream      { color: var(--cream-100); }\n.text-ink-60     { color: var(--ink-60); }\n.text-ink-40     { color: var(--ink-40); }\n\n.font-display { font-family: var(--font-display); }\n.font-body    { font-family: nt-family:var(--font-body);\">\n\n  <!-- ════════════════════ HERO ════════════════════ -->\n  <header style=\"position:absolute; top:0; left:0; right:0; z-index:3; display:flex; align-items:center; justify-content:space-between; padding:26px 48px;\">\n    <div style=\"font-family:var(--font-display); font-size:23px; font-weight:400; letter-spacing:-0.01em; color:var(--cream-100);\">kaffeløsninger<em style=\"font-style:italic; color:var(--color-terracotta);\">.dk<\u002Fem><\u002Fdiv>\n    <nav style=\"display:flex; align-items:center; gap:32px;\">\n      <span style=\"font:var(--type-body-s); color:var(--cream-80); cursor:pointer;\">Sådan virker det<\u002Fspan>\n      <span style=\"font:var(--type-body-s); color:var(--cream-80); cursor:pointer;\">Fordele<\u002Fspan>\n      <span style=\"font:var(--type-body-s); color:var(--cream-80); cursor:pointer;\">Kontakt<\u002Fspan>\n      <button type=\"button\" class=\"btn btn-primary\" style=\"border-radius:0; padding:11px 20px;\">Få 3 tilbud<\u002Fbutton>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <section style=\"position:relative; background:var(--color-forest-deep); overflow:hidden;\">\n    <img src=\"981b784e-b4b9-4e61-859b-cc98d5d6d9dd\" alt=\"Espressomaskine\" style=\"position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0.38;\">\n    <div style=\"position:absolute; inset:0; background:linear-gradient(115deg, rgba(20,38,32,0.94) 0%, rgba(20,38,32,0.78) 42%, rgba(20,38,32,0.5) 100%);\"><\u002Fdiv>\n    <div style=\"position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:128px 48px 80px; display:grid; grid-template-columns:1.05fr 0.95fr; gap:60px; align-items:center;\">\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--color-sage);\">Kaffeløsninger til erhverv<\u002Fspan>\n        <h1 style=\"font:var(--type-h1); font-size:62px; letter-spacing:-0.02em; color:var(--cream-100); margin-top:20px;\">Få 3 tilbud på kontorets kaffeløsning<\u002Fh1>\n        <p style=\"font:var(--type-body-l); color:var(--cream-80); margin-top:24px; max-width:46ch;\">Fortæl os om jeres behov. Vi sender det videre til op til 3 leverandører, der konkurrerer om at give jer det skarpeste tilbud — så I får den bedste handel.<\u002Fp>\n        <div style=\"display:flex; align-items:center; gap:14px; margin-top:40px;\">\n          <div style=\"width:40px; height:1px; background:var(--cream-60);\"><\u002Fdiv>\n          <span style=\"font:var(--type-small); color:var(--cream-60);\">Brugt af 200+ danske kontorer<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--color-paper); border:1px solid var(--ink-10); box-shadow:0 4px 16px rgba(26,26,21,0.06), 0 12px 40px rgba(26,26,21,0.10); padding:34px; width:100%; box-sizing:border-box;\">\n\n        <!-- ════════════════════ FORM ════════════════════ -->\n        <sc-if value=\"{{ active }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <!-- progress header -->\n            <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:12px;\">\n              <span class=\"eyebrow\" style=\"color:var(--color-terracotta); letter-spacing:0.14em;\">{{ stepLabel }}<\u002Fspan>\n              <span style=\"font:var(--type-mono); color:var(--ink-40); font-size:12px;\">kaffeløsninger.dk<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:3px; background:var(--ink-10); margin-top:12px; border-radius:999px; overflow:hidden;\">\n              <div style=\"{{ progressStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n\n            <h3 style=\"font:var(--type-h4); margin-top:22px; margin-bottom:4px; letter-spacing:-0.01em;\">{{ stepTitle }}<\u002Fh3>\n            <p style=\"font:var(--type-body-s); color:var(--fg-3); margin:0 0 22px; max-width:42ch;\">{{ stepSub }}<\u002Fp>\n\n            <!-- STEP 0 — forbrug -->\n            <sc-if value=\"{{ show0 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:10px; color:var(--fg-2);\">Antal medarbejdere<\u002Flabel>\n                <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:8px;\">\n                  <sc-for list=\"{{ sizeOptions }}\" as=\"opt\" hint-placeholder-count=\"6\">\n                    <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <p style=\"font:var(--type-micro); color:var(--ink-40); margin:14px 0 0; line-height:1.5;\">Ud fra antallet beregner vi selv det forventede kaffeforbrug — så det skal I ikke tænke på.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- STEP 1 — drikkevarer -->\n            <sc-if value=\"{{ show1 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; gap:24px;\">\n                <div>\n                  <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:12px; color:var(--fg-2);\">Hvilke drikke skal maskinen kunne lave?<\u002Flabel>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n                    <sc-for list=\"{{ beverageOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                      <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ showMilk }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"border-top:1px solid var(--ink-10); padding-top:22px;\">\n                    <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:12px; color:var(--fg-2);\">Type mælk til cappuccino / caffe latte<\u002Flabel>\n                    <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n                      <sc-for list=\"{{ milkOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                        <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- STEP 2 — maskine & vand -->\n            <sc-if value=\"{{ show2 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; gap:22px;\">\n                <div>\n                  <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:10px; color:var(--fg-2);\">Hvordan vil I anskaffe maskinen?<\u002Flabel>\n                  <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:8px;\">\n                    <sc-for list=\"{{ acquireOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                      <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:10px; color:var(--fg-2);\">Vandtilslutning<\u002Flabel>\n                  <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:8px;\">\n                    <sc-for list=\"{{ waterOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                      <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- STEP 3 — kontakt -->\n            <sc-if value=\"{{ show3 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; gap:14px;\">\n                <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n                  <div>\n                    <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:6px; color:var(--fg-2);\">Navn<\u002Flabel>\n                    <input type=\"text\" value=\"{{ data.name }}\" onchange=\"{{ onName }}\" placeholder=\"Dit fulde navn\" style=\"{{ inputStyle }}\">\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:6px; color:var(--fg-2);\">Virksomhed<\u002Flabel>\n                    <input type=\"text\" value=\"{{ data.company }}\" onchange=\"{{ onCompany }}\" placeholder=\"Virksomhedens navn\" style=\"{{ inputStyle }}\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:6px; color:var(--fg-2);\">Arbejdsmail<\u002Flabel>\n                  <input type=\"email\" value=\"{{ data.email }}\" onchange=\"{{ onEmail }}\" placeholder=\"navn@virksomhed.dk\" style=\"{{ inputStyle }}\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block; font:var(--type-small); font-weight:600; margin-bottom:6px; color:var(--fg-2);\">Telefon<\u002Flabel>\n                  <input type=\"tel\" value=\"{{ data.phone }}\" onchange=\"{{ onPhone }}\" placeholder=\"+45 00 00 00 00\" style=\"{{ inputStyle }}\">\n                <\u002Fdiv>\n                <p style=\"font:var(--type-micro); color:var(--ink-40); margin:6px 0 0; line-height:1.5;\">Vi deler kun dine oplysninger med op til 3 udvalgte leverandører. Ingen spam — det lover vi.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- nav buttons -->\n            <div style=\"display:flex; gap:12px; margin-top:28px; align-items:center;\">\n              <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ false }}\">\n                <button type=\"button\" class=\"btn btn-ghost\" onclick=\"{{ back }}\" style=\"border-radius:0;\">Tilbage<\u002Fbutton>\n              <\u002Fsc-if>\n              <button type=\"button\" class=\"btn btn-primary\" onclick=\"{{ next }}\" disabled=\"{{ nextDisabled }}\" style=\"{{ nextStyle }}\">{{ nextLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- success -->\n        <sc-if value=\"{{ done }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center; padding:18px 6px 8px;\">\n            <div style=\"width:64px; height:64px; border-radius:999px; background:var(--color-forest); color:var(--cream-100); display:flex; align-items:center; justify-content:center; margin:0 auto 22px; font:var(--type-h3); font-family:var(--font-display);\">✓<\u002Fdiv>\n            <h3 style=\"font:var(--type-h3); margin-bottom:10px;\">{{ thanksTitle }}<\u002Fh3>\n            <p style=\"font:var(--type-body); color:var(--fg-2); max-width:38ch; margin:0 auto 24px;\">Vi matcher jeres behov med op til 3 leverandører. De kontakter jer med hvert deres tilbud inden for 48 timer — så kan I vælge det bedste.<\u002Fp>\n            <button type=\"button\" class=\"btn btn-ghost\" onclick=\"{{ reset }}\" style=\"border-radius:0;\">Send en ny forespørgsel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ SÅDAN VIRKER DET ════════════════════ -->\n  <section id=\"saadan\" style=\"padding:96px 24px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"max-width:640px; margin-bottom:60px;\">\n        <span class=\"eyebrow\">Sådan virker det<\u002Fspan>\n        <h2 style=\"font:var(--type-h2); letter-spacing:-0.015em; margin-top:16px;\">Tre trin til den bedste kontorkaffe<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:48px;\">\n\n        <div style=\"border-top:2px solid var(--color-forest); padding-top:24px;\">\n          <div style=\"font-family:var(--font-display); font-size:60px; line-height:1; color:var(--color-terracotta); font-weight:300; letter-spacing:-0.02em;\">01<\u002Fdiv>\n          <h3 style=\"font:var(--type-h4); margin:20px 0 10px;\">Fortæl os om jeres behov<\u002Fh3>\n          <p style=\"font:var(--type-body); color:var(--fg-2); margin:0;\">Udfyld formularen på under et minut. Antal medarbejdere, kopper om dagen, drikkevarer, køb eller leje — det hele.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"border-top:2px solid var(--color-forest); padding-top:24px;\">\n          <div style=\"font-family:var(--font-display); font-size:60px; line-height:1; color:var(--color-terracotta); font-weight:300; letter-spacing:-0.02em;\">02<\u002Fdiv>\n          <h3 style=\"font:var(--type-h4); margin:20px 0 10px;\">Op til 3 leverandører byder<\u002Fh3>\n          <p style=\"font:var(--type-body); color:var(--fg-2); margin:0;\">Vi matcher jer med relevante leverandører, der hver især giver deres skarpeste tilbud — fordi de ved, de konkurrerer.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"border-top:2px solid var(--color-forest); padding-top:24px;\">\n          <div style=\"font-family:var(--font-display); font-size:60px; line-height:1; color:var(--color-terracotta); font-weight:300; letter-spacing:-0.02em;\">03<\u002Fdiv>\n          <h3 style=\"font:var(--type-h4); margin:20px 0 10px;\">Vælg det bedste tilbud<\u002Fh3>\n          <p style=\"font:var(--type-body); color:var(--fg-2); margin:0;\">Sammenlign tilbuddene side om side og vælg det, der passer jer bedst. Helt uforpligtende — I bestemmer.<\u002Fp>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ HVORFOR KONKURRENCE ════════════════════ -->\n  <section style=\"background:var(--color-sage); padding:96px 24px;\">\n    <div style=\"max-width:1180px; margin:0 auto; display:grid; grid-template-columns:5fr 7fr; gap:80px; align-items:start;\">\n\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--color-forest);\">Hvorfor kaffeløsninger.dk<\u002Fspan>\n        <h2 style=\"font:var(--type-h2); letter-spacing:-0.015em; margin-top:16px; color:var(--color-forest);\">Når leverandører konkurrerer, vinder I<\u002Fh2>\n        <p style=\"font:var(--type-body-l); color:var(--ink-80); margin-top:20px;\">Den gamle model er at ringe rundt og håbe på en god pris. Vi vender den om: leverandørerne kommer til jer — og kæmper om ordren.<\u002Fp>\n\n        <div style=\"display:flex; gap:40px; margin-top:48px; flex-wrap:wrap;\">\n          <div>\n            <div style=\"font-family:var(--font-display); font-size:56px; line-height:1; color:var(--color-forest); font-weight:400; letter-spacing:-0.02em;\">3<em style=\"font-style:italic; color:var(--color-terracotta);\"><\u002Fem><\u002Fdiv>\n            <div style=\"font:var(--type-small); color:var(--ink-80); margin-top:8px;\">konkurrerende tilbud<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--font-display); font-size:56px; line-height:1; color:var(--color-forest); font-weight:400; letter-spacing:-0.02em;\">48<em style=\"font-style:italic; color:var(--color-terracotta); font-size:28px;\">t<\u002Fem><\u002Fdiv>\n            <div style=\"font:var(--type-small); color:var(--ink-80); margin-top:8px;\">typisk svartid<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:var(--font-display); font-size:56px; line-height:1; color:var(--color-forest); font-weight:400; letter-spacing:-0.02em;\">0<em style=\"font-style:italic; color:var(--color-terracotta); font-size:28px;\"> kr.<\u002Fem><\u002Fdiv>\n            <div style=\"font:var(--type-small); color:var(--ink-80); margin-top:8px;\">at bruge tjenesten<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(26,26,21,0.12); border:1px solid rgba(26,26,21,0.12);\">\n        <div style=\"background:var(--color-sage); padding:28px;\">\n          <h4 style=\"font:var(--type-h4); font-size:20px; margin-bottom:10px; color:var(--color-forest);\">Bedre priser, hver gang<\u002Fh4>\n          <p style=\"font:var(--type-body-s); color:var(--ink-80); margin:0;\">Leverandørerne ved, de byder mod hinanden. Det presser prisen ned — uden at I skal forhandle.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--color-sage); padding:28px;\">\n          <h4 style=\"font:var(--type-h4); font-size:20px; margin-bottom:10px; color:var(--color-forest);\">Skræddersyet forbrug<\u002Fh4>\n          <p style=\"font:var(--type-body-s); color:var(--ink-80); margin:0;\">Tilbuddene matcher præcis jeres antal kopper og drikkevarer — ikke en standardpakke.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--color-sage); padding:28px;\">\n          <h4 style=\"font:var(--type-h4); font-size:20px; margin-bottom:10px; color:var(--color-forest);\">Spar timer på research<\u002Fh4>\n          <p style=\"font:var(--type-body-s); color:var(--ink-80); margin:0;\">Én forespørgsel i stedet for at ringe rundt til ti leverandører hver for sig.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--color-sage); padding:28px;\">\n          <h4 style=\"font:var(--type-h4); font-size:20px; margin-bottom:10px; color:var(--color-forest);\">Helt uforpligtende<\u002Fh4>\n          <p style=\"font:var(--type-body-s); color:var(--ink-80); margin:0;\">I vælger frit blandt tilbuddene. Ingen binding, ingen skjulte gebyrer.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ TESTIMONIALS ════════════════════ -->\n  <section style=\"padding:96px 24px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"max-width:640px; margin-bottom:56px;\">\n        <span class=\"eyebrow\">Erfaringer<\u002Fspan>\n        <h2 style=\"font:var(--type-h2); letter-spacing:-0.015em; margin-top:16px;\">Typiske erfaringer fra kontorer<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:32px;\">\n\n        <figure style=\"margin:0; background:var(--color-paper); border:1px solid var(--ink-10); padding:32px; display:flex; flex-direction:column; gap:24px;\">\n          <blockquote style=\"margin:0; font-family:var(--font-display); font-size:22px; line-height:1.4; color:var(--color-forest); font-weight:400;\">\"Vi fik hurtigt flere sammenlignelige tilbud og kunne vælge en løsning, der passede bedre til vores behov.\"<\u002Fblockquote>\n          <figcaption style=\"font:var(--type-small); color:var(--fg-3); margin-top:auto;\"><strong style=\"color:var(--fg-1); font-weight:600;\">Kontorchef<\u002Fstrong><br>Mindre rådgivningsvirksomhed<\u002Ffigcaption>\n        <\u002Ffigure>\n\n        <figure style=\"margin:0; background:var(--color-paper); border:1px solid var(--ink-10); padding:32px; display:flex; flex-direction:column; gap:24px;\">\n          <blockquote style=\"margin:0; font-family:var(--font-display); font-size:22px; line-height:1.4; color:var(--color-forest); font-weight:400;\">\"Det gjorde processen overskuelig. Vi slap for at kontakte mange leverandører hver for sig.\"<\u002Fblockquote>\n          <figcaption style=\"font:var(--type-small); color:var(--fg-3); margin-top:auto;\"><strong style=\"color:var(--fg-1); font-weight:600;\">Office manager<\u002Fstrong><br>Kreativt kontormiljø<\u002Ffigcaption>\n        <\u002Ffigure>\n\n        <figure style=\"margin:0; background:var(--color-paper); border:1px solid var(--ink-10); padding:32px; display:flex; flex-direction:column; gap:24px;\">\n          <blockquote style=\"margin:0; font-family:var(--font-display); font-size:22px; line-height:1.4; color:var(--color-forest); font-weight:400;\">\"Tilbuddene var lettere at sammenligne, fordi leverandørerne tog udgangspunkt i de samme oplysninger.\"<\u002Fblockquote>\n          <figcaption style=\"font:var(--type-small); color:var(--fg-3); margin-top:auto;\"><strong style=\"color:var(--fg-1); font-weight:600;\">HR-ansvarlig<\u002Fstrong><br>Mellemstor arbejdsplads<\u002Ffigcaption>\n        <\u002Ffigure>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ════════════════════ FOOTER ════════════════════ -->\n  <footer style=\"background:var(--color-forest); color:var(--cream-100); padding:80px 24px 40px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:48px; padding-bottom:56px; border-bottom:1px solid rgba(244,239,230,0.18);\">\n        <div>\n          <div style=\"font-family:var(--font-display); font-size:27px; font-weight:400; letter-spacing:-0.01em;\">kaffeløsninger<em style=\"font-style:italic; color:var(--color-terracotta);\">.dk<\u002Fem><\u002Fdiv>\n          <p style=\"font:var(--type-body-s); color:var(--cream-80); margin-top:16px; max-width:34ch;\">Vi finder den rigtige kaffeløsning til jeres kontor — ved at lade leverandørerne konkurrere om jer.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font:var(--type-eyebrow); text-transform:uppercase; letter-spacing:0.12em; color:var(--cream-60); margin-bottom:18px;\">Produkt<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px; font:var(--type-body-s);\">\n            <span style=\"color:var(--cream-80);\">Sådan virker det<\u002Fspan>\n            <span style=\"color:var(--cream-80);\">Drikkevarer<\u002Fspan>\n            <span style=\"color:var(--cream-80);\">Priser<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font:var(--type-eyebrow); text-transform:uppercase; letter-spacing:0.12em; color:var(--cream-60); margin-bottom:18px;\">Virksomhed<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px; font:var(--type-body-s);\">\n            <span style=\"color:var(--cream-80);\">Om os<\u002Fspan>\n            <span style=\"color:var(--cream-80);\">Bliv leverandør<\u002Fspan>\n            <span style=\"color:var(--cream-80);\">Kontakt<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font:var(--type-eyebrow); text-transform:uppercase; letter-spacing:0.12em; color:var(--cream-60); margin-bottom:18px;\">Kontakt<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px; font:var(--type-body-s); color:var(--cream-80);\">\n            <span>Kontakt via formularen<\u002Fspan>\n            <span>For virksomheder i Danmark<\u002Fspan>\n            <span>Gratis og uforpligtende<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:center; padding-top:28px; font:var(--type-micro); color:var(--cream-60); flex-wrap:wrap; gap:12px;\">\n        <span>© 2026 Kaffeløsninger.dk<\u002Fspan>\n        <span>Handelsbetingelser · Privatlivspolitik · Cookies<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    step: 0,\n    done: false,\n    data: { size:null, beverages:[], milk:[], acquire:null, water:null, name:'', company:'', email:'', phone:'' }\n  };\n\n  titles = ['Jeres forbrug', 'Drikkevarer', 'Maskine & vand', 'Hvem kontakter vi?'];\n  subs = [\n    'Fortæl os hvor mange I er — så regner vi selv kaffeforbruget ud.',\n    'Hvad skal maskinen kunne lave? Vælg alt det, der er relevant.',\n    'Sidste tekniske detaljer, så leverandørerne kan ramme plet.',\n    'Vi sender kun videre til de leverandører, der matcher jeres behov.'\n  ];\n\n  set(key, val) { this.setState(s => ({ data: { ...s.data, [key]: val } })); }\n\n  toggleBev = (v) => {\n    this.setState(s => {\n      let arr = s.data.beverages.slice();\n      if (v === 'unknown') {\n        arr = arr.includes('unknown') ? [] : ['unknown'];\n        return { data: { ...s.data, beverages: arr, milk: [] } };\n      }\n      arr = arr.filter(x => x !== 'unknown');\n      arr = arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v];\n      const milk = arr.includes('cappuccino') ? s.data.milk : [];\n      return { data: { ...s.data, beverages: arr, milk } };\n    });\n  };\n\n  toggleMilk = (v) => {\n    this.setState(s => {\n      let arr = s.data.milk.slice();\n      if (v === 'unknown') {\n        arr = arr.includes('unknown') ? [] : ['unknown'];\n        return { data: { ...s.data, milk: arr } };\n      }\n      arr = arr.filter(x => x !== 'unknown');\n      arr = arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v];\n      return { data: { ...s.data, milk: arr } };\n    });\n  };\n\n  optStyle(sel, span) {\n    const st = {\n      display:'block', width:'100%', textAlign:'center', boxSizing:'border-box',\n      padding:'13px 10px',\n      border:'1px solid ' + (sel ? 'var(--color-forest)' : 'var(--ink-20)'),\n      background: sel ? 'var(--color-forest)' : 'var(--color-white)',\n      color: sel ? 'var(--cream-100)' : 'var(--fg-1)',\n      borderRadius:'4px', cursor:'pointer',\n      font:'var(--type-body-s)', fontWeight: sel ? 600 : 400, lineHeight:1.25,\n      transition:'border-color 200ms var(--ease-out-soft), background 200ms var(--ease-out-soft), color 200ms var(--ease-out-soft)'\n    };\n    if (span) st.gridColumn = '1 / -1';\n    return st;\n  }\n  chipStyle(sel) {\n    return {\n      padding:'11px 20px',\n      border:'1px solid ' + (sel ? 'var(--color-terracotta)' : 'var(--ink-20)'),\n      background: sel ? 'var(--color-terracotta)' : 'var(--color-white)',\n      color: sel ? 'var(--cream-100)' : 'var(--fg-1)',\n      borderRadius:'999px', cursor:'pointer',\n      font:'var(--type-body-s)', fontWeight: sel ? 600 : 500, whiteSpace:'nowrap',\n      transition:'all 200ms var(--ease-out-soft)'\n    };\n  }\n\n  milkUnlocked() { return this.state.data.beverages.includes('cappuccino'); }\n\n  canNext() {\n    const d = this.state.data;\n    switch (this.state.step) {\n      case 0: return !!d.size;\n      case 1: return d.beverages.length > 0 && (!this.milkUnlocked() || d.milk.length > 0);\n      case 2: return !!d.acquire && !!d.water;\n      case 3: return d.name.trim() && d.company.trim() && /.+@.+\\..+/.test(d.email) && d.phone.trim().length >= 6;\n      default: return false;\n    }\n  }\n\n  next = () => {\n    if (!this.canNext()) return;\n    if (this.state.step === 3) { this.setState({ done: true }); return; }\n    this.setState(s => ({ step: s.step + 1 }));\n  };\n  back = () => this.setState(s => ({ step: Math.max(0, s.step - 1) }));\n  reset = () => this.setState({ step:0, done:false, data:{ size:null, beverages:[], milk:[], acquire:null, water:null, name:'', company:'', email:'', phone:'' } });\n\n  renderVals() {\n    const d = this.state.data, step = this.state.step;\n    const sizeOptions = [['1–10','xs'],['11–25','s'],['26–50','m'],['51–100','l'],['101–250','xl'],['250+','xxl']]\n      .map(([l,v]) => ({ label:l, value:v, style:this.optStyle(d.size===v, false), onClick:()=>this.set('size',v) }));\n    const beverageOptions = [['Kaffe / espresso','coffee'],['Cappuccino / caffe latte','cappuccino'],['Kakao / Chai','cocoa'],['Ved ikke','unknown']]\n      .map(([l,v]) => ({ label:l, value:v, style:this.chipStyle(d.beverages.includes(v)), onClick:()=>this.toggleBev(v) }));\n    const milkOptions = [['Frisk mælk','fresh'],['Pulvermælk','powder'],['Ved ikke','unknown']]\n      .map(([l,v]) => ({ label:l, value:v, style:this.chipStyle(d.milk.includes(v)), onClick:()=>this.toggleMilk(v) }));\n    const acquireOptions = [['Køb','buy'],['Leje','rent'],['Leasing','lease'],['Ved ikke','unknown']]\n      .map(([l,v]) => ({ label:l, value:v, style:this.optStyle(d.acquire===v, v==='unknown'), onClick:()=>this.set('acquire',v) }));\n    const waterOptions = [['Fast vandtilslutning','fixed'],['Indbygget vandtank','tank'],['Ved ikke','unknown']]\n      .map(([l,v]) => ({ label:l, value:v, style:this.optStyle(d.water===v, v==='unknown'), onClick:()=>this.set('water',v) }));\n\n    const inputStyle = {\n      width:'100%', boxSizing:'border-box', padding:'12px 14px',\n      border:'1px solid var(--ink-20)', borderRadius:'4px', background:'var(--color-white)',\n      font:'var(--type-body-s)', color:'var(--fg-1)', outline:'none'\n    };\n\n    const ok = this.canNext();\n    const nextStyle = { borderRadius:0, opacity: ok ? 1 : 0.4, cursor: ok ? 'pointer' : 'not-allowed', pointerEvents: ok ? 'auto' : 'none' };\n\n    return {\n      active: !this.state.done,\n      done: this.state.done,\n      step,\n      stepLabel: 'Trin ' + (step+1) + ' af 4',\n      stepTitle: this.titles[step],\n      stepSub: this.subs[step],\n      progressStyle: { width: ((step+1)/4*100) + '%', height:'100%', background:'var(--color-terracotta)', transition:'width 350ms var(--ease-out-soft)' },\n      show0: step===0, show1: step===1, show2: step===2, show3: step===3,\n      showMilk: this.milkUnlocked(),\n      showBack: step>0,\n      nextDisabled: !ok,\n      nextStyle,\n      nextLabel: step===3 ? 'Send forespørgsel' : 'Videre',\n      thanksTitle: d.name ? ('Tak, ' + d.name.trim().split(' ')[0] + '!') : 'Tak!',\n      sizeOptions, beverageOptions, milkOptions, acquireOptions, waterOptions,\n      inputStyle, data: d,\n      next: this.next, back: this.back, reset: this.reset,\n      onName: e => this.set('name', e.target.value),\n      onCompany: e => this.set('company', e.target.value),\n      onEmail: e => this.set('email', e.target.value),\n      onPhone: e => this.set('phone', e.target.value)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
  <script>
    (function () {
      const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbz9gkEQKDnMZM3WIooF88BVyHKP9Lrzc0KC151cPBtkUBgz82s2Ict_OeN781_yicaAig/exec";
      const originalInfo = console.info ? console.info.bind(console) : function () {};

      function sendLead(payload) {
        const body = JSON.stringify(payload);

        if (navigator.sendBeacon) {
          const blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
          if (navigator.sendBeacon(WEBHOOK_URL, blob)) {
            return;
          }
        }

        fetch(WEBHOOK_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body
        }).catch((error) => console.warn("Lead webhook failed", error));
      }

      function getButtonText(button) {
        return (button && button.textContent ? button.textContent : "").replace(/\s+/g, " ").trim();
      }

      function getActiveButtonText(candidates) {
        const buttons = Array.from(document.querySelectorAll("button"));
        const normalizedCandidates = candidates.map((candidate) => candidate.toLowerCase());
        const active = buttons.find((button) => {
          const text = getButtonText(button).toLowerCase();
          const styles = window.getComputedStyle(button);
          return normalizedCandidates.includes(text) && styles.backgroundColor !== "rgb(255, 255, 255)";
        });

        return active ? getButtonText(active) : "";
      }

      function buildLeadFromDom() {
        const inputs = Array.from(document.querySelectorAll("input"));
        const name = inputs.find((input) => input.placeholder === "Dit fulde navn")?.value.trim() || "";
        const company = inputs.find((input) => input.placeholder === "Virksomhedens navn")?.value.trim() || "";
        const email = inputs.find((input) => input.placeholder === "navn@virksomhed.dk")?.value.trim() || "";
        const phone = inputs.find((input) => input.placeholder === "+45 00 00 00 00")?.value.trim() || "";
        const companySize = getActiveButtonText(["1–10", "11–25", "26–50", "51–100", "101–250", "250+"]);
        const machineType = getActiveButtonText(["Køb", "Leje", "Leasing", "Ved ikke"]);
        const waterType = getActiveButtonText(["Fast vandtilslutning", "Indbygget vandtank", "Ved ikke"]);
        const beverageButtons = Array.from(document.querySelectorAll("button")).filter((button) => {
          const text = getButtonText(button);
          const styles = window.getComputedStyle(button);
          return ["Kaffe / espresso", "Cappuccino / caffe latte", "Kakao / Chai", "Ved ikke", "Frisk mælk", "Pulvermælk"].includes(text)
            && styles.backgroundColor !== "rgb(255, 255, 255)";
        });
        const requirements = beverageButtons.map((button) => getButtonText(button));
        if (waterType) requirements.push(waterType);

        const cupEstimates = {
          "1–10": "5-30",
          "11–25": "15-75",
          "26–50": "30-150",
          "51–100": "60-300",
          "101–250": "120-750",
          "250+": "750+"
        };

        return {
          submittedAt: new Date().toISOString(),
          companyType: "",
          companySize,
          dailyCups: cupEstimates[companySize] || "",
          machineType,
          requirements,
          name,
          company,
          email,
          phone,
          notes: "",
          source: "kaffelosninger.dk landing page"
        };
      }

      let lastDomSubmissionAt = 0;

      document.addEventListener("click", function (event) {
        const button = event.target.closest("button");
        if (!button) return;

        if (getButtonText(button) !== "Send forespørgsel") return;
        if (Date.now() - lastDomSubmissionAt < 2000) return;

        lastDomSubmissionAt = Date.now();
        try {
          sendLead(buildLeadFromDom());
        } catch (error) {
          console.warn("Lead DOM capture failed", error);
        }
      }, true);

      const leadState = {
        companySize: "",
        beverages: [],
        milk: [],
        machineType: "",
        waterType: "",
        name: "",
        company: "",
        email: "",
        phone: ""
      };

      function normalizeLeadText(value) {
        return (value || "").replace(/\s+/g, " ").trim();
      }

      function leadCurrentStepTitle() {
        const titles = Array.from(document.querySelectorAll("h3"));
        const visible = titles.find((title) => {
          const text = normalizeLeadText(title.textContent);
          const rect = title.getBoundingClientRect();
          return rect.width > 0 && rect.height > 0 && [
            "Jeres forbrug",
            "Drikkevarer",
            "Maskine & vand",
            "Hvem kontakter vi?"
          ].includes(text);
        });
        return visible ? normalizeLeadText(visible.textContent) : "";
      }

      function leadToggleValue(list, value) {
        const index = list.indexOf(value);
        if (index >= 0) list.splice(index, 1);
        else list.push(value);
      }

      function syncLeadContactFields() {
        const inputs = Array.from(document.querySelectorAll("input"));
        leadState.name = inputs.find((input) => input.placeholder === "Dit fulde navn")?.value.trim() || leadState.name;
        leadState.company = inputs.find((input) => input.placeholder === "Virksomhedens navn")?.value.trim() || leadState.company;
        leadState.email = inputs.find((input) => input.placeholder === "navn@virksomhed.dk")?.value.trim() || leadState.email;
        leadState.phone = inputs.find((input) => input.placeholder === "+45 00 00 00 00")?.value.trim() || leadState.phone;
      }

      document.addEventListener("input", function () {
        syncLeadContactFields();
      }, true);

      document.addEventListener("click", function (event) {
        const button = event.target.closest("button");
        if (!button) return;

        const text = normalizeLeadText(getButtonText(button));
        const step = leadCurrentStepTitle();

        if (text === "Send en ny forespørgsel") {
          leadState.companySize = "";
          leadState.beverages = [];
          leadState.milk = [];
          leadState.machineType = "";
          leadState.waterType = "";
          leadState.name = "";
          leadState.company = "";
          leadState.email = "";
          leadState.phone = "";
          return;
        }

        if (step === "Jeres forbrug" && ["1–10", "11–25", "26–50", "51–100", "101–250", "250+"].includes(text)) {
          leadState.companySize = text;
        }

        if (step === "Drikkevarer") {
          if (["Kaffe / espresso", "Cappuccino / caffe latte", "Kakao / Chai", "Ved ikke"].includes(text)) {
            if (text === "Ved ikke") {
              leadState.beverages = leadState.beverages.includes(text) ? [] : [text];
              leadState.milk = [];
            } else {
              leadState.beverages = leadState.beverages.filter((value) => value !== "Ved ikke");
              leadToggleValue(leadState.beverages, text);
              if (!leadState.beverages.includes("Cappuccino / caffe latte")) {
                leadState.milk = [];
              }
            }
          } else if (["Frisk mælk", "Pulvermælk", "Ved ikke"].includes(text) && leadState.beverages.includes("Cappuccino / caffe latte")) {
            if (text === "Ved ikke") {
              leadState.milk = leadState.milk.includes(text) ? [] : [text];
            } else {
              leadState.milk = leadState.milk.filter((value) => value !== "Ved ikke");
              leadToggleValue(leadState.milk, text);
            }
          }
        }

        if (step === "Maskine & vand") {
          if (["Køb", "Leje", "Leasing", "Ved ikke"].includes(text)) {
            leadState.machineType = text;
          } else if (["Fast vandtilslutning", "Indbygget vandtank", "Ved ikke"].includes(text)) {
            leadState.waterType = text;
          }
        }
      }, true);

      buildLeadFromDom = function () {
        syncLeadContactFields();

        const cupEstimates = {
          "1–10": "5-30",
          "11–25": "15-75",
          "26–50": "30-150",
          "51–100": "60-300",
          "101–250": "120-750",
          "250+": "750+"
        };

        return {
          submittedAt: new Date().toISOString(),
          companyType: "",
          companySize: leadState.companySize,
          dailyCups: cupEstimates[leadState.companySize] || "",
          machineType: leadState.machineType,
          requirements: []
            .concat(leadState.beverages)
            .concat(leadState.milk)
            .concat(leadState.waterType ? [leadState.waterType] : []),
          name: leadState.name,
          company: leadState.company,
          email: leadState.email,
          phone: leadState.phone,
          notes: "",
          source: "kaffelosninger.dk landing page"
        };
      };

      console.info = function (...args) {
        try {
          if (args[0] === "Lead ready for submission" && args[1] && typeof args[1] === "object") {
            sendLead(args[1]);
          }
        } catch (error) {
          console.warn("Lead webhook bridge failed", error);
        }

        return originalInfo(...args);
      };
    })();
  </script>
